<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nur Diş Kliniği</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Work Sans', sans-serif; background: #EFFAFC; }
    #app { max-width: 430px; margin: 0 auto; background: white; min-height: 100vh; padding-bottom: 20px; }
    .screen { padding: 20px; }
    .hero { background: linear-gradient(135deg, #075E70, #02B0D4); color: white; padding: 40px 20px; text-align: center; font-size: 28px; font-weight: bold; border-radius: 16px; margin-bottom: 20px; }
    button { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 12px; background: #075E70; color: white; font-weight: 500; cursor: pointer; font-size: 14px; }
    button:active { transform: scale(0.98); }
    h2 { color: #075E70; margin-bottom: 20px; }
    h3 { color: #075E70; margin-top: 20px; margin-bottom: 10px; }
    .card { background: #E1F6FB; border-radius: 12px; padding: 15px; margin: 10px 0; }
    input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
