<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Nur Diş & Dental Klinik</title>
<meta name="theme-color" content="#0A5C52" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F1FAF8; --surface:#FFFFFF; --ink:#163330; --muted:#5D7873;
    --teal:#0A5C52; --tealLight:#13897A; --blue:#2E8FC0; --cta:#1FAE7E;
    --ctaDark:#158F65; --line:#DCEFEA; --bad:#C24A3E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#E3EFEC;font-family:'Work Sans',sans-serif;color:var(--ink);}
  #shell{max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;}
  #screen{padding-bottom:88px;}
  .topbar{background:linear-gradient(135deg,var(--teal),var(--blue));}
  .topbar-inner{padding:28px 24px 22px;display:flex;align-items:flex-start;gap:12px;}
  .logo-badge{background:rgba(255,255,255,.15);border-radius:16px;padding:10px;display:flex;align-items:center;justify-content:center;font-size:22px;}
  .eyebrow{color:#CFEFE6;text-transform:uppercase;font-size:11px;letter-spacing:.15em;font-family:'IBM Plex Mono',monospace;margin:0 0 4px;}
  .title{color:#fff;font-family:'Fraunces',serif;font-weight:600;font-size:24px;margin:0;line-height:1.2;}
  .subtitle{color:#DFF3EF;font-size:13px;margin:4px 0 0;}
  .scallop{display:block;width:100%;height:14px;}
  .content{padding:0 20px 24px;margin-top:-2px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;}
  .p4{padding:16px;} .p5{padding:20px;}
  .row{display:flex;align-items:center;gap:12px;}
  .row-start{display:flex;align-items:flex-start;gap:12px;}
  .mb3{margin-bottom:12px;} .mb4{margin-bottom:16px;} .mb5{margin-bottom:20px;}
  .badge{border-radius:12px;padding:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .badge-teal{background:#E4F7F1;} .badge-blue{background:#E4F3FA;}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin:0 0 8px;}
  .name{font-family:'Fraunces',serif;font-weight:600;color:var(--ink);font-size:16px;margin:0;}
  .desc{font-size:12px;color:var(--muted);margin:4px 0 0;}
  .price-pill{font-size:11px;padding:5px 10px;border-radius:999px;font-family:'IBM Plex Mono',monospace;flex-shrink:0;white-space:nowrap;}
  .pill-teal{background:#E4F7F1;color:var(--ctaDark);} .pill-blue{background:#E4F3FA;color:var(--blue);}
  .btn-primary{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;padding:14px;font-weight:500;font-family:'Work Sans',sans-serif;font-size:14px;background:var(--cta);color:#fff;cursor:pointer;transition:transform .1s;}
  .btn-primary:active{transform:scale(.98);}
  .btn-primary:disabled{background:#9FCFC0;opacity:.8;cursor:not-allowed;}
  .field{display:block;margin-bottom:14px;}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;}
  .input, select, textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#FBFEFD;color:var(--ink);font-family:'Work Sans',sans-serif;font-size:14px;outline:none;}
  textarea{min-height:90px;resize:vertical;}
  .slot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .slot{padding:8px 0;border-radius:10px;border:1px solid var(--line);background:#FBFEFD;color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:center;cursor:pointer;}
  .slot.active{background:var(--teal);border-color:var(--teal);color:#fff;}
  .hscroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
  .hscroll::-webkit-scrollbar{display:none;}
  .mini-card{flex-shrink:0;width:138px;border-radius:16px;padding:16px;background:var(--teal);}
  .mini-card .name{color:#fff;font-size:14px;}
  .mini-card .price{color:#9BE8CE;font-family:'IBM Plex Mono',monospace;font-size:11px;margin-top:10px;}
  .status-ok{color:var(--tealLight);font-size:13px;display:flex;align-items:center;gap:6px;margin-top:12px;}
  .status-err{color:var(--bad);font-size:13px;margin-top:12px;}
  .myth-x{background:#FBEAE7;color:var(--bad);border-radius:999px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px;}
  .myth-check{background:#E4F7F1;color:var(--ctaDark);border-radius:999px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px;}
  .navbar{position:fixed;bottom:0;left:0;right:0;margin:0 auto;max-width:430px;background:var(--surface);border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;padding:8px 4px;overflow-x:auto;}
  .navbtn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);font-family:'Work Sans',sans-serif;font-size:9px;padding:4px 6px;cursor:pointer;flex-shrink:0;}
  .navbtn .icon{font-size:18px;}
  .navbtn.active{color:var(--teal);font-weight:600;}
  .footnote{font-size:11px;color:var(--muted);margin-top:8px;}
</style>
</head>
<body>
<div id="shell">
  <div id="screen"></div>
  <div class="navbar" id="navbar"></div>
</div>
<script>
/* ---------------------------------------------------------
   NUR DİŞ & DENTAL KLİNİK — bağımsız (offline) mobil uygulama
   Vanilla JS + localStorage. React/Tailwind bağımlılığı yok,
   böylece PWA Builder / Capacitor / WebView sarmalayıcılarıyla
   doğrudan APK'ya paketlenebilir.
--------------------------------------------------------- */

const SERVICES = [
  { id: "muayene", name: "Diş Muayenesi & Kontrol", price: "500 ₺", desc: "Genel ağız sağlığı kontrolü ve yönlendirme.", icon: "🩺", tone:"teal" },
  { id: "temizlik", name: "Diş Temizliği (Detertraj)", price: "900 ₺", desc: "Diş taşı ve leke temizliği, parlatma.", icon: "✨", tone:"teal" },
  { id: "dolgu", name: "Dolgu", price: "700–1.500 ₺", desc: "Estetik kompozit dolgu uygulamaları.", icon: "🧩", tone:"teal" },
  { id: "kanal", name: "Kanal Tedavisi", price: "2.500–4.000 ₺", desc: "Ağrısız kanal tedavisi, tek/çok seans.", icon: "🌀", tone:"teal" },
  { id: "cekim", name: "Diş Çekimi", price: "800–2.000 ₺", desc: "Basit ve cerrahi çekim işlemleri.", icon: "✂️", tone:"teal" },
  { id: "beyazlatma", name: "Diş Beyazlatma", price: "3.000 ₺", desc: "Ofis tipi profesyonel beyazlatma.", icon: "☀️", tone:"teal" },
  { id: "implant", name: "İmplant", price: "12.000–18.000 ₺", desc: "Tek dişten tam çeneye implant çözümleri.", icon: "⚓", tone:"teal" },
  { id: "ortodonti", name: "Ortodonti (Tel Tedavisi)", price: "Muayene sonrası", desc: "Şeffaf plak ve metal braket seçenekleri.", icon: "⭕", tone:"blue" },
  { id: "seffafplak", name: "Şeffaf Plak", price: "Muayene sonrası", desc: "Görünmez, çıkarılabilir diş düzeltme plakları.", icon: "◯", tone:"blue" },
  { id: "kopru", name: "Köprü", price: "4.000–9.000 ₺ / diş", desc: "Eksik dişler için sabit köprü protezi.", icon: "🔗", tone:"blue" },
];

const PRODUCTS = [
  { id: "p1", name: "Diş Fırçası (Yumuşak/Orta)", price: "60 ₺" },
  { id: "p2", name: "Diş Macunu (Florürlü)", price: "90 ₺" },
  { id: "p3", name: "Ağız Gargarası", price: "120 ₺" },
  { id: "p4", name: "Diş İpi", price: "40 ₺" },
  { id: "p5", name: "Ağız Duşu (Irrigatör)", price: "650 ₺" },
  { id: "p6", name: "Ev Tipi Beyazlatma Kiti", price: "950 ₺" },
];

const MYTHS = [
  { wrong: "Diş eti kanaması normaldir, önemli değildir.", right: "Kanama genellikle diş eti iltihabının belirtisidir; kontrole gidilmelidir." },
  { wrong: "Sadece şeker dişe zarar verir.", right: "Asitli içecekler ve meyve suları da diş minesini aşındırır." },
  { wrong: "Diş ağrısı geçtiyse sorun kalmamıştır.", right: "Ağrının kesilmesi bazen sinirin hasar gördüğü anlamına gelir, tedavi şarttır." },
  { wrong: "Süt dişleri önemli değildir, nasılsa dökülecek.", right: "Süt dişleri çene gelişimi ve kalıcı dişlerin konumu için kritik rol oynar." },
  { wrong: "Sert fırçalamak dişleri daha iyi temizler.", right: "Sert fırçalama diş eti çekilmesine ve mine aşınmasına yol açar." },
];

const TIPS = [
  "Günde en az 2 kez, 2'şer dakika fırçalayın.",
  "Diş ipini günlük rutininize ekleyin.",
  "6 ayda bir diş hekimi kontrolüne gidin.",
  "Fırçanızı 3 ayda bir yenileyin.",
];

const TIME_SLOTS = ["09:00","10:00","11:00","12:00","14:00","15:00","16:00","17:00"];

const TABS = [
  { id: "home", label: "Ana Sayfa", icon: "🏠" },
  { id: "services", label: "Hizmetler", icon: "✨" },
  { id: "products", label: "Ürünler", icon: "📦" },
  { id: "info", label: "Bilgi", icon: "📘" },
  { id: "booking", label: "Randevu", icon: "📅" },
  { id: "contact", label: "İletişim", icon: "💬" },
];

let state = {
  screen: "home",
  appointments: [],
  bookingForm: { service: SERVICES[0].id, date: "", time: "", name: "", phone: "" },
  bookingStatus: "idle",
  contactForm: { name: "", phone: "", msg: "" },
  contactStatus: "idle",
};

function loadStorage() {
  try { state.appointments = JSON.parse(localStorage.getItem("nurdis_appointments") || "[]"); }
  catch (e) { state.appointments = []; }
}
function saveAppointments() {
  localStorage.setItem("nurdis_appointments", JSON.stringify(state.appointments));
}
function saveMessage(entry) {
  let list = [];
  try { list = JSON.parse(localStorage.getItem("nurdis_messages") || "[]"); } catch (e) { list = []; }
  list.push(entry);
  localStorage.setItem("nurdis_messages", JSON.stringify(list));
}

function scallop() {
  let d = "M0,10 ";
  for (let i = 0; i < 10; i++) d += `Q${i*10+5},0 ${i*10+10},10 `;
  d += "L100,10 Z";
  return `<svg class="scallop" viewBox="0 0 100 10" preserveAspectRatio="none"><path d="${d}" fill="#F1FAF8"/></svg>`;
}

function topbar(title, subtitle) {
  return `
    <div class="topbar">
      <div class="topbar-inner">
        <div class="logo-badge">🦷</div>
        <div>
          <p class="eyebrow">Nur Diş &amp; Dental Klinik</p>
          <h1 class="title">${title}</h1>
          ${subtitle ? `<p class="subtitle">${subtitle}</p>` : ""}
        </div>
      </div>
      ${scallop()}
    </div>`;
}

function renderHome() {
  const featured = SERVICES.slice(0, 5).map(s => `
    <div class="mini-card">
      <div style="font-size:18px;">${s.icon}</div>
      <p class="name">${s.name}</p>
      <p class="price">${s.price}</p>
    </div>`).join("");

  return `
    ${topbar("Gülümsemenin adresi", "Nazik bakım, güvenilir gülüşler.")}
    <div class="content">
      <div class="card p5 mb4" style="border-color:var(--cta);">
        <div class="row-start">
          <div class="badge badge-teal">✨</div>
          <div>
            <p class="name" style="font-size:17px;">Hızlı randevu</p>
            <p class="desc">60 saniyede uygun saati seç, biz seni arayalım.</p>
            <button class="navbtn" data-action="goto" data-screen="booking" style="color:var(--tealLight);padding:8px 0 0;font-size:13px;font-weight:500;flex-direction:row;">Randevu al &rarr;</button>
          </div>
        </div>
      </div>

      <div class="card p4 mb5 row">
        <div class="badge badge-teal">👤</div>
        <div>
          <p class="name" style="font-size:14px;">Diş Hekimi Ramazan DAĞ</p>
          <p class="desc">Klinik sorumlu hekimi</p>
        </div>
      </div>

      <p class="section-label">Neden bizi seçmelisiniz</p>
      <div class="mb5">
        <div class="card p4 mb3 row">
          <div style="font-size:20px;">🛡️</div>
          <div><p class="name" style="font-size:14px;">Steril ortam</p><p class="desc">Her hasta için tam sterilizasyon protokolü.</p></div>
        </div>
        <div class="card p4 mb3 row">
          <div style="font-size:20px;">💧</div>
          <div><p class="name" style="font-size:14px;">Hijyene özel tasarım</p><p class="desc">Yeşil-mavi-beyaz temiz klinik konsepti.</p></div>
        </div>
        <div class="card p4 row">
          <div style="font-size:20px;">🕐</div>
          <div><p class="name" style="font-size:14px;">Esnek saatler</p><p class="desc">Hafta içi 09:00–18:00 arası kesintisiz hizmet.</p></div>
        </div>
      </div>

      <p class="section-label">Öne çıkan hizmetler</p>
      <div class="hscroll">${featured}</div>
    </div>`;
}

function renderServices() {
  const items = SERVICES.map(s => `
    <div class="card p4 mb3 row">
      <div class="badge ${s.tone === 'blue' ? 'badge-blue' : 'badge-teal'}">${s.icon}</div>
      <div style="flex:1;padding-right:8px;">
        <p class="name">${s.name}</p>
        <p class="desc">${s.desc}</p>
      </div>
      <span class="price-pill ${s.tone === 'blue' ? 'pill-blue' : 'pill-teal'}">${s.price}</span>
    </div>`).join("");
  return `${topbar("Hizmetler", "Fiyatlar başlangıç seviyesindedir, muayene sonrası netleşir.")}<div class="content">${items}</div>`;
}

function renderProducts() {
  const items = PRODUCTS.map(p => `
    <div class="card p4 mb3 row">
      <div class="badge badge-blue">📦</div>
      <div style="flex:1;"><p class="name" style="font-size:14px;">${p.name}</p></div>
      <span class="price-pill pill-blue">${p.price}</span>
    </div>`).join("");
  return `${topbar("Ürünler", "Klinikten temin edebileceğiniz ağız bakım ürünleri.")}
    <div class="content">
      ${items}
      <p class="footnote">Ürün isimleri ve fiyatları örnektir — gerçek ürün listenizi verirseniz güncellenebilir.</p>
    </div>`;
}

function renderInfo() {
  const tips = TIPS.map(t => `<div class="card p4 mb3 row"><div style="font-size:16px;">📘</div><p style="font-size:14px;margin:0;">${t}</p></div>`).join("");
  const myths = MYTHS.map(m => `
    <div class="card p4 mb3">
      <div class="row-start mb3">
        <div class="myth-x">✕</div>
        <p class="desc" style="margin:0;">${m.wrong}</p>
      </div>
      <div class="row-start">
        <div class="myth-check">✓</div>
        <p class="name" style="font-size:14px;">${m.right}</p>
      </div>
    </div>`).join("");
  return `${topbar("Diş Sağlığı Bilgileri", "Doğru bilinen yanlışlar ve genel öneriler.")}
    <div class="content">
      <p class="section-label">Günlük öneriler</p>
      <div class="mb5">${tips}</div>
      <p class="section-label">Doğru bilinen yanlışlar</p>
      ${myths}
    </div>`;
}

function renderBooking() {
  const f = state.bookingForm;
  const opts = SERVICES.map(s => `<option value="${s.id}" ${s.id===f.service?"selected":""}>${s.name}</option>`).join("");
  const slots = TIME_SLOTS.map(t => `<div class="slot ${f.time===t?'active':''}" data-action="pick-time" data-time="${t}">${t}</div>`).join("");
  const canSubmit = f.date && f.time && f.name && f.phone;

  let statusHtml = "";
  if (state.bookingStatus === "done") statusHtml = `<p class="status-ok">✓ Randevun kaydedildi, en kısa sürede teyit için aranacaksın.</p>`;
  if (state.bookingStatus === "error") statusHtml = `<p class="status-err">Kaydedilemedi, lütfen tekrar dene.</p>`;

  const list = state.appointments.slice().reverse().map(a => `
    <div class="card p4 mb3 row" style="justify-content:space-between;">
      <div><p class="name" style="font-size:14px;">${a.service}</p><p class="desc">${a.name} · ${a.phone}</p></div>
      <span style="font-size:12px;color:var(--tealLight);font-family:'IBM Plex Mono',monospace;">${a.date} ${a.time}</span>
    </div>`).join("");

  return `${topbar("Randevu al", "Uygun gün, saat ve iletişim bilgilerini bırak.")}
    <div class="content">
      <div class="card p5 mb5">
        <div class="field"><label>Hizmet</label><select id="f-service">${opts}</select></div>
        <div class="field"><label>Tarih</label><input class="input" type="date" id="f-date" value="${f.date}" /></div>
        <div class="field"><label>Saat</label><div class="slot-grid">${slots}</div></div>
        <div class="field"><label>Ad Soyad</label><input class="input" id="f-name" placeholder="Adınız Soyadınız" value="${f.name}" /></div>
        <div class="field"><label>Telefon</label><input class="input" id="f-phone" placeholder="05xx xxx xx xx" value="${f.phone}" /></div>
        <button class="btn-primary" data-action="submit-booking" ${!canSubmit || state.bookingStatus==='saving' ? 'disabled' : ''}>
          ${state.bookingStatus === 'saving' ? 'Kaydediliyor…' : '📅 Randevuyu onayla'}
        </button>
        ${statusHtml}
      </div>
      ${state.appointments.length ? `<p class="section-label">Randevularım</p>${list}` : ""}
    </div>`;
}

function renderContact() {
  const c = state.contactForm;
  const canSubmit = c.name && c.msg;
  let statusHtml = "";
  if (state.contactStatus === "done") statusHtml = `<p class="status-ok">✓ Mesajın iletildi, teşekkürler.</p>`;
  if (state.contactStatus === "error") statusHtml = `<p class="status-err">Gönderilemedi, lütfen tekrar dene.</p>`;

  return `${topbar("İletişim", "Bize ulaş, ya da mesaj bırak.")}
    <div class="content">
      <div class="mb5">
        <div class="card p4 mb3 row"><div style="font-size:16px;">📍</div><p style="margin:0;font-size:14px;">Mardin, Kızıltepe, TOKİ</p></div>
        <div class="card p4 mb3 row"><div style="font-size:16px;">📞</div><p style="margin:0;font-size:14px;">0505 105 03 02</p></div>
        <div class="card p4 mb3 row"><div style="font-size:16px;">🕐</div><p style="margin:0;font-size:14px;">Hafta içi 09:00–18:00, Cumartesi 10:00–14:00</p></div>
        <div class="card p4 row"><div style="font-size:16px;">👤</div><p style="margin:0;font-size:14px;">Diş Hekimi Ramazan DAĞ</p></div>
      </div>
      <div class="card p5">
        <p class="name" style="font-size:17px;margin-bottom:12px;">Mesaj bırak</p>
        <div class="field"><label>Ad Soyad</label><input class="input" id="c-name" placeholder="Adınız Soyadınız" value="${c.name}" /></div>
        <div class="field"><label>Telefon (opsiyonel)</label><input class="input" id="c-phone" placeholder="05xx xxx xx xx" value="${c.phone}" /></div>
        <div class="field"><label>Mesajınız</label><textarea id="c-msg" placeholder="Sorunuzu ya da talebinizi yazın">${c.msg}</textarea></div>
        <button class="btn-primary" data-action="submit-contact" ${!canSubmit || state.contactStatus==='saving' ? 'disabled' : ''}>
          ${state.contactStatus === 'saving' ? 'Gönderiliyor…' : '💬 Mesajı gönder'}
        </button>
        ${statusHtml}
      </div>
    </div>`;
}

function renderNav() {
  return TABS.map(t => `
    <button class="navbtn ${state.screen===t.id?'active':''}" data-action="goto" data-screen="${t.id}">
      <span class="icon">${t.icon}</span><span>${t.label}</span>
    </button>`).join("");
}

function render() {
  const screenEl = document.getElementById("screen");
  const map = { home: renderHome, services: renderServices, products: renderProducts, info: renderInfo, booking: renderBooking, contact: renderContact };
  screenEl.innerHTML = map[state.screen]();
  document.getElementById("navbar").innerHTML = renderNav();
  bindFieldEvents();
}

function bindFieldEvents() {
  if (state.screen === "booking") {
    const s = document.getElementById("f-service");
    const d = document.getElementById("f-date");
    const n = document.getElementById("f-name");
    const p = document.getElementById("f-phone");
    if (s) s.onchange = e => { state.bookingForm.service = e.target.value; };
    if (d) d.onchange = e => { state.bookingForm.date = e.target.value; state.bookingStatus="idle"; render(); };
    if (n) n.oninput = e => { state.bookingForm.name = e.target.value; };
    if (p) p.oninput = e => { state.bookingForm.phone = e.target.value; };
  }
  if (state.screen === "contact") {
    const n = document.getElementById("c-name");
    const p = document.getElementById("c-phone");
    const m = document.getElementById("c-msg");
    if (n) n.oninput = e => { state.contactForm.name = e.target.value; };
    if (p) p.oninput = e => { state.contactForm.phone = e.target.value; };
    if (m) m.oninput = e => { state.contactForm.msg = e.target.value; };
  }
}

document.addEventListener("click", (e) => {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.dataset.action;

  if (action === "goto") {
    state.screen = el.dataset.screen;
    window.scrollTo(0, 0);
    render();
  }
  if (action === "pick-time") {
    state.bookingForm.time = el.dataset.time;
    state.bookingStatus = "idle";
    render();
  }
  if (action === "submit-booking") {
    const f = state.bookingForm;
    if (!(f.date && f.time && f.name && f.phone)) return;
    state.bookingStatus = "saving";
    render();
    setTimeout(() => {
      const entry = { id: Date.now(), service: SERVICES.find(s => s.id === f.service).name, date: f.date, time: f.time, name: f.name, phone: f.phone };
      state.appointments.push(entry);
      saveAppointments();
      state.bookingStatus = "done";
      state.bookingForm = { service: SERVICES[0].id, date: "", time: "", name: "", phone: "" };
      render();
    }, 300);
  }
  if (action === "submit-contact") {
    const c = state.contactForm;
    if (!(c.name && c.msg)) return;
    state.contactStatus = "saving";
    render();
    setTimeout(() => {
      saveMessage({ id: Date.now(), name: c.name, phone: c.phone, msg: c.msg });
      state.contactStatus = "done";
      state.contactForm = { name: "", phone: "", msg: "" };
      render();
    }, 300);
  }
});

loadStorage();
const validScreens = TABS.map(t => t.id);
const hash = window.location.hash.replace("#", "");
if (validScreens.includes(hash)) state.screen = hash;
render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
